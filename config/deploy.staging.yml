# Deploy to these servers.
#
# Hosts here (and accessory hosts below) are SSH targets, so they use the grey
# DNS-only record dev-origin.fffeeder.com that resolves straight to the box. The
# public name dev.fffeeder.com is Cloudflare-proxied (orange); using it as an
# SSH target would route port 22 through Cloudflare and fail. proxy.host stays
# the public name. See docs/deployment-setup.md.
servers:
  web:
    hosts:
      - dev-origin.fffeeder.com
    env:
      clear:
        # Gauge sampling runs once in the Puma master process; see
        # config/initializers/metrics.rb.
        METRICS_GAUGES: "true"
  jobs:
    hosts:
      - dev-origin.fffeeder.com
    cmd: bin/jobs

# Configure proxy for web role.
#
# dev.fffeeder.com is Cloudflare-proxied, so kamal-proxy can't use Let's Encrypt
# here: the ACME HTTP-01 challenge would land on Cloudflare instead of the
# origin. Instead it serves a Cloudflare Origin Certificate loaded from the
# CERTIFICATE_PEM/PRIVATE_KEY_PEM secrets. Pair with Cloudflare SSL mode
# Full (strict). See docs/deployment-setup.md.
proxy:
  ssl:
    certificate_pem: CERTIFICATE_PEM
    private_key_pem: PRIVATE_KEY_PEM
  host: dev.fffeeder.com

# Accessories.
accessories:
  db:
    image: postgres:18
    host: dev-origin.fffeeder.com
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_DB: f2_staging
        POSTGRES_USER: f2
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql

  # Temporary metrics backend for staging. VictoriaMetrics with its built-in
  # web UI (vmui at :8428/vmui). Bound to localhost — the app pushes over the
  # private Kamal network (see METRICS_URL below); view the UI via an SSH
  # tunnel: ssh -L 8428:127.0.0.1:8428 dev-origin.fffeeder.com → http://localhost:8428/vmui
  # Remove with: bin/kamal accessory remove victoriametrics -d staging
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.145.0
    host: dev-origin.fffeeder.com
    port: "127.0.0.1:8428:8428"
    cmd: "-retentionPeriod=1 -promscrape.config=/etc/victoriametrics/scrape.yml -vmui.customDashboardsPath=/etc/victoriametrics/dashboards"
    files:
      - config/victoriametrics/scrape.yml:/etc/victoriametrics/scrape.yml
      - config/victoriametrics/dashboards/node-overview.json:/etc/victoriametrics/dashboards/node-overview.json
    directories:
      - vmdata:/victoria-metrics-data

  # Host-level OS metrics (disk space, RAM, CPU). Reads the host root through
  # a read-only mount; scraped by VictoriaMetrics over the Kamal network
  # (see config/victoriametrics/scrape.yml), so no published port.
  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.11.1
    host: dev-origin.fffeeder.com
    cmd: "--path.rootfs=/host"
    volumes:
      - "/:/host:ro,rslave"

  # Self-hosted log storage with a built-in web UI, fed by the vector accessory.
  # Bound to localhost — reach the UI via an SSH tunnel (see docs/victorialogs.md).
  # Remove with: bin/kamal accessory remove vlogs -d staging
  vlogs:
    image: victoriametrics/victoria-logs:v1.51.0
    host: dev-origin.fffeeder.com
    port: "127.0.0.1:9428:9428"
    cmd: "-retentionPeriod=2d -storageDataPath=/vlogs"
    directories:
      - data:/vlogs

  # Reads web/jobs container stdout via the Docker API and forwards the JSON
  # lines to VictoriaLogs over the Kamal network.
  # Remove with: bin/kamal accessory remove vector -d staging
  vector:
    image: timberio/vector:0.56.0-alpine
    host: dev-origin.fffeeder.com
    cmd: "--config /etc/vector/vector.yaml"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    files:
      - config/vector/vector.yaml:/etc/vector/vector.yaml

# Environment variables.
env:
  clear:
    RAILS_ENV: staging
    HOSTS: dev.fffeeder.com
    ACTION_MAILER_HOST: dev.fffeeder.com
    MAILER_FROM: hello@fffeeder.com
    # Mirror production's clustered Puma (2 workers x 3 threads) so staging
    # exercises the real multi-worker paths: per-worker counter flushing,
    # single-master gauge sampling, and cross-worker Solid Cable broadcast.
    WEB_CONCURRENCY: 2
    # Reaches the victoriametrics accessory by container name over the Kamal
    # network. Unset this (or remove the accessory) to disable metrics.
    METRICS_URL: http://f2-victoriametrics:8428/api/v1/import/prometheus
    # The sampled gauges move on hour scales; a 60s push loses no visible
    # resolution and quarters the per-process DB sampling.
    METRICS_FLUSH_INTERVAL: "60"
  # Kamal deep-merges this destination over config/deploy.yml, and the merge
  # replaces arrays rather than concatenating them. So this list must repeat
  # the base secrets (RAILS_MASTER_KEY, POSTGRES_PASSWORD) — otherwise they
  # never reach the staging container and the app boots without credentials.
  # IMGPROXY_KEY/SALT are shared by the web and jobs roles so the app can sign
  # imgproxy URLs, matching what the standalone imgproxy app verifies against.
  secret:
    - RAILS_MASTER_KEY
    - POSTGRES_PASSWORD
    - IMGPROXY_KEY
    - IMGPROXY_SALT
