# Deploy to these servers.
servers:
  web:
    - fffeeder.com
  jobs:
    hosts:
      - fffeeder.com
    cmd: bin/jobs

# Configure proxy for web role.
proxy:
  ssl: true
  host: fffeeder.com

# Accessories.
accessories:
  db:
    image: postgres:18
    host: fffeeder.com
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_DB: f2_production
        POSTGRES_USER: f2
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql

# Environment variables.
env:
  clear:
    RAILS_ENV: production
    HOSTS: fffeeder.com
    ACTION_MAILER_HOST: fffeeder.com
    # Run Puma in clustered mode with 2 workers x 3 threads to use both CPU
    # cores. Kept conservative because the jobs role and the Postgres accessory
    # share this 2-core host. If memory becomes the binding constraint, drop
    # back to 1 worker.
    WEB_CONCURRENCY: 2
