# Standalone Kamal app for imgproxy, deployed independently from the main app:
#
#   bin/kamal deploy -c config/deploy.imgproxy.yml
#
# See docs/deployment-imgproxy.md for secrets, DNS, and Cloudflare setup.
service: imgproxy

image: dreikanter/imgproxy

registry:
  server: ghcr.io
  username: dreikanter
  password:
    - KAMAL_REGISTRY_PASSWORD

# imgproxy ships as a prebuilt public image; config/imgproxy/Dockerfile is a
# thin FROM wrapper so Kamal can retag and push it to our registry.
builder:
  arch: amd64
  dockerfile: config/imgproxy/Dockerfile
  context: config/imgproxy

servers:
  web:
    # The deploy host is the box Kamal SSHes into and where kamal-proxy runs the
    # ACME challenge, so it must resolve directly to the server. Do NOT use
    # imgproxy.fffeeder.com here: that name is Cloudflare-proxied (the CDN), so
    # SSH and Let's Encrypt would hit Cloudflare instead of the origin. The
    # public CDN name is set as proxy.host below.
    hosts:
      - dev.fffeeder.com

proxy:
  ssl: true
  host: imgproxy.fffeeder.com
  app_port: 8080
  # imgproxy serves its health endpoint at /health, not kamal-proxy's default /up.
  healthcheck:
    path: /health

env:
  clear:
    IMGPROXY_BIND: ":8080"
    IMGPROXY_ENABLE_WEBP_DETECTION: "true"
    # Long Cache-Control so Cloudflare holds each variant on the edge.
    IMGPROXY_TTL: "31536000"
  secret:
    - IMGPROXY_KEY
    - IMGPROXY_SALT
