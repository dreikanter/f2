# Files in the config/locales directory are used for internationalization and
# are automatically loaded by Rails. If you want to use locales other than
# English, add the necessary files in this directory.
#
# To use the locales, use `I18n.t`:
#
#     I18n.t "hello"
#
# In views, this is aliased to just `t`:
#
#     <%= t("hello") %>
#
# To use a different locale, set it with `I18n.locale`:
#
#     I18n.locale = :es
#
# This would use the information in config/locales/es.yml.
#
# To learn more about the API, please read the Rails Internationalization guide
# at https://guides.rubyonrails.org/i18n.html.
#
# Be aware that YAML interprets the following case-insensitive strings as
# booleans: `true`, `false`, `on`, `off`, `yes`, `no`. Therefore, these strings
# must be quoted to be interpreted as strings. For example:
#
#     en:
#       "yes": yup
#       enabled: "ON"

en:
  hello: "Hello world"

  events:
    feed_enabled:
      name: "Feed enabled"
      description_html: "%{subject_link} enabled"
    feed_disabled:
      name: "Feed disabled"
      description_html: "%{subject_link} disabled"
    feed_auto_disabled:
      name: "Feed turned off"
      description_html: "%{subject_link} was turned off after repeated errors"
    feed_target_group_unavailable:
      name: "Group unavailable"
      description_html: "%{subject_link} was turned off because %{reason}"
      reasons:
        posting_denied: "it lost permission to post to its FreeFeed group"
        group_not_found: "its FreeFeed group no longer exists or was renamed"
        default: "its FreeFeed group is no longer available"
    feed_ai_model_unavailable:
      name: "AI model unavailable"
      description_html: "%{subject_link}'s AI model is no longer available, so it's running on a fallback for now — pick a new model to keep it accurate."
    feed_refresh:
      name: "Feed refreshed"
      description_html: "%{subject_link} refreshed"
    feed_refresh_error:
      name: "Feed refresh failed"
      description_html: "%{subject_link} couldn't refresh; %{message}"
    feed_refresh_skipped:
      name: "Feed refresh skipped"
      description_html: "%{subject_link} already produced this period's digest, so the scheduled refresh was skipped"
    feed_refresh_ai_empty:
      name: "Nothing to import"
      description_html: "%{subject_link} found no posts to import this time"
    ai_credential_deactivated:
      name: "AI credential deactivated"
      description_html: "AI credential %{subject_link} stopped working; update the key to resume its feeds."
    post_withdrawn:
      name: "Post withdrawn"
      description_html: "Post removed from FreeFeed"
    post_deleted:
      name: "Post deleted"
      description_html: "Post deleted from %{subject_link}"
    access_token_validation_failed:
      name: "Token validation failed"
      description_html: "FreeFeed token stopped working; disabled %{feed_links}"
    group_purge_started:
      name: "Feed purge started"
      description_html: "Clearing out %{subject_link}"
    email_changed:
      name: "Email changed"
      description_html: "Email address updated"
    user_suspended:
      name: "User suspended"
      description_html: "Account suspended"
    user_unsuspended:
      name: "User unsuspended"
      description_html: "Account restored"
    resend_email_sent:
      name: "Email sent"
      description_html: "Email sent"
    resend_email_delivered:
      name: "Email delivered"
      description_html: "Email delivered"
    resend_email_delayed:
      name: "Email delayed"
      description_html: "Email delivery delayed"
    resend_email_opened:
      name: "Email opened"
      description_html: "Email opened"
    resend_email_clicked:
      name: "Email clicked"
      description_html: "Email link clicked"
    resend_email_bounced:
      name: "Email bounced"
      description_html: "Email bounced"
    resend_email_complained:
      name: "Spam complaint"
      description_html: "Spam complaint received"
    resend_email_failed:
      name: "Email failed"
      description_html: "Email delivery failed"
    metadata:
      stats:
        section_title: "Stats"
        started_at: "Started at"
        completed_at: "Completed at"
        total_duration: "Duration"
        new_entries: "New entries"
        new_posts: "New posts"

