name: T7 product patch trigger

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/006-t7-search-usage-events
      - name: Apply embedded product patch
        run: |
          python3 - <<'PY'
          from pathlib import Path

          target = Path("app/services/llm_client.rb")
          old_line = "adapter.apply_web(chat, model, search_provider: search_provider_for(ctx)) if web"
          if old_line not in target.read_text():
              raise SystemExit(0)

          workflow = Path(".github/workflows/t7-product-patch.yml").read_text()
          marker = "          python3 - <<'PY'\n"
          script = workflow.split(marker, 1)[1].split("\n          PY\n", 1)[0]
          script = "\n".join(line[10:] if line.startswith("          ") else line for line in script.splitlines())
          exec(compile(script, "t7-product-patch", "exec"))
          PY
      - name: Commit product wiring
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app config CHANGELOG.md
          git diff --cached --quiet && exit 0
          git commit -m "Add web search usage events and estimates"
          git push
