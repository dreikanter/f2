name: Debug comment delivery

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
          --tmpfs=/var/lib/postgresql

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run focused tests
        id: tests
        continue-on-error: true
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432
          COVERAGE: "1"
        run: |
          bin/rails db:test:prepare
          bin/rails test \
            test/jobs/post_comment_delivery_test.rb \
            test/components/feed_post_comments_failed_event_test.rb \
            test/jobs/post_publish_job_test.rb \
            test/jobs/publication_scheduler_job_test.rb \
            test/services/freefeed_publisher_test.rb \
            > focused-test.log 2>&1

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: focused-test-output
          path: focused-test.log

      - name: Fail when tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
