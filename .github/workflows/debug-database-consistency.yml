name: Debug database consistency

on:
  pull_request:

jobs:
  debug:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
          --tmpfs=/var/lib/postgresql
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
      - name: Run database consistency
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432
        run: |
          set +e
          bin/rails db:test:prepare > database-consistency.log 2>&1
          status=$?
          if [ "$status" -eq 0 ]; then
            bundle exec database_consistency -c .database_consistency.todo.yml >> database-consistency.log 2>&1
            status=$?
          fi
          echo "$status" > database-consistency.status
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: database-consistency-diagnostics
          path: |
            database-consistency.log
            database-consistency.status
