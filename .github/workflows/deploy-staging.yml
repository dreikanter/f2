name: Deploy Staging

on:
  push:
    branches: [ staging ]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      POSTGRES_PASSWORD_STAGING: ${{ secrets.POSTGRES_PASSWORD_STAGING }}
      IMGPROXY_KEY: ${{ secrets.IMGPROXY_KEY }}
      IMGPROXY_SALT: ${{ secrets.IMGPROXY_SALT }}
      CF_ORIGIN_CERT: ${{ secrets.CF_ORIGIN_CERT }}
      CF_ORIGIN_KEY: ${{ secrets.CF_ORIGIN_KEY }}
      # Optional LLM provider keys for the capability probe job.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan dev-origin.fffeeder.com >> ~/.ssh/known_hosts

      - name: Write Rails master key
        env:
          RAILS_MASTER_KEY_STAGING: ${{ secrets.RAILS_MASTER_KEY_STAGING }}
        run: |
          mkdir -p config/credentials
          printf '%s' "$RAILS_MASTER_KEY_STAGING" > config/credentials/staging.key
          chmod 600 config/credentials/staging.key

      - name: Deploy to staging
        run: bin/kamal deploy -d staging

      # TEMP (claude/digest-regime): live-verify the nullable source_url schema
      # against the providers before merging #937. Remove before merge.
      - name: Verify digest schema on staging
        run: bin/kamal app exec --reuse "bin/rails ai:verify_digest_schema" -d staging
