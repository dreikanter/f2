name: T5 refresh auth patch

on:
  push:
    branches:
      - agent/006-t5-client-side-search

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/006-t5-client-side-search
      - name: Patch refresh auth handling
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("app/services/feed_refresh_workflow.rb")
          text = path.read_text()
          text = text.replace(
              "    disable_credential_on_auth_error(error)\n",
              "    disable_credentials_on_auth_error(error)\n",
          )
          old = '''  def disable_credential_on_auth_error(error)\n    return unless error.is_a?(LlmClient::AuthError)\n    return unless feed.ai_credential\n\n    feed.ai_credential.disable_credential_and_feeds(last_error: error.message)\n  end\n'''
          new = '''  def disable_credentials_on_auth_error(error)\n    case error\n    when LlmClient::AuthError\n      feed.ai_credential&.disable_credential_and_feeds(last_error: error.message)\n    when WebSearchProvider::AuthError\n      feed.search_credential&.deactivate!(last_error: error.message)\n    end\n  end\n'''
          if old not in text:
              raise SystemExit("refresh auth method did not match expected source")
          path.write_text(text.replace(old, new))
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/services/feed_refresh_workflow.rb
          git diff --cached --quiet && exit 0
          git commit -m "Handle search credential auth failures"
          git push
