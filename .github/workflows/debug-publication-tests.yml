name: Debug publication tests

on:
  pull_request:

jobs:
  full:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v7

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run full tests
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432
        run: |
          set +e
          bin/rails db:test:prepare > full-test.log 2>&1
          status=$?
          if [ $status -eq 0 ]; then
            bin/rails test >> full-test.log 2>&1
            status=$?
          fi
          cat full-test.log
          exit $status

      - name: Upload full log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: full-test-log
          path: full-test.log
