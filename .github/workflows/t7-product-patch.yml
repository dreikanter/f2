name: T7 product patch

on:
  push:
    branches:
      - agent/006-t7-search-usage-events

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/006-t7-search-usage-events
      - name: Apply search usage wiring
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace(path, old, new):
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f"expected text not found in {path}: {old[:100]!r}")
              file.write_text(text.replace(old, new))

          replace(
              "app/services/llm_client.rb",
              "    adapter.apply_web(chat, model, search_provider: search_provider_for(ctx)) if web\n",
              '''    if web
              adapter.apply_web(
                chat,
                model,
                search_provider: search_provider_for(ctx),
                search_credential: ctx.search_credential,
                refresh_event: ctx.refresh_event
              )
            end
          ''',
          )

          replace(
              "app/services/loader/llm_loader.rb",
              '''        purpose: options.fetch(:purpose, :scheduled_run),
              search_credential: feed.search_credential
            )
          ''',
              '''        purpose: options.fetch(:purpose, :scheduled_run),
              search_credential: feed.search_credential,
              refresh_event: options[:refresh_event]
            )
          ''',
          )

          replace(
              "app/services/feed_refresh_workflow.rb",
              "    raw_data = feed.loader_instance.load\n",
              "    raw_data = feed.loader_instance(refresh_event: @refresh_event).load\n",
          )

          replace(
              "app/services/feed_refresh_workflow.rb",
              '''  def interrupt_abandoned_event(event)
              usage_rows = abandoned_llm_usage_rows(event)
              metadata = event.metadata.merge("status" => "interrupted")

              if usage_rows.any?
                metadata["stats"] = metadata.fetch("stats", {}).merge(
                  "llm_calls" => usage_rows.size,
                  "llm_cost_cents" => usage_rows.sum { |_id, cents| cents }
                )
              end

              event.update!(level: :debug, metadata: metadata)
              reference_llm_usages(event, usage_rows)
            end
          ''',
              '''  def interrupt_abandoned_event(event)
              usage_rows = abandoned_llm_usage_rows(event)
              search_event_ids = event.event_references.where(reference_type: "Event").pluck(:reference_id)
              stats_updates = {}
              metadata = event.metadata.merge("status" => "interrupted")

              if usage_rows.any?
                stats_updates.merge!(
                  "llm_calls" => usage_rows.size,
                  "llm_cost_cents" => usage_rows.sum { |_id, cents| cents }
                )
              end
              stats_updates["search_calls"] = search_event_ids.size if search_event_ids.any?
              metadata["stats"] = metadata.fetch("stats", {}).merge(stats_updates) if stats_updates.any?

              event.update!(level: :debug, metadata: metadata)
              reference_llm_usages(event, usage_rows)
            end
          ''',
          )

          replace(
              "app/services/feed_refresh_workflow.rb",
              '''  def complete_refresh_event(posts)
              @refresh_event.destroy!
              usage_rows = run_llm_usage_rows
              record_llm_usage_stats(usage_rows)

              event = Event.create!(
                type: "feed_refresh",
                level: :info,
                subject: feed,
                user: feed.user,
                metadata: { status: "completed", stats: stats }
              )

              @refresh_completed = true
              reference_posts(event, posts)
              reference_llm_usages(event, usage_rows)
            end
          ''',
              '''  def complete_refresh_event(posts)
              usage_rows = run_llm_usage_rows
              search_event_ids = run_web_search_event_ids
              @refresh_event.destroy!
              record_llm_usage_stats(usage_rows)
              record_web_search_stats(search_event_ids)

              event = Event.create!(
                type: "feed_refresh",
                level: :info,
                subject: feed,
                user: feed.user,
                metadata: { status: "completed", stats: stats }
              )

              @refresh_completed = true
              reference_posts(event, posts)
              reference_llm_usages(event, usage_rows)
              reference_web_searches(event, search_event_ids)
            end
          ''',
          )

          replace(
              "app/services/feed_refresh_workflow.rb",
              '''  def disable_credentials_on_auth_error(error)
          ''',
              '''  def run_web_search_event_ids
              @refresh_event.event_references.where(reference_type: "Event").pluck(:reference_id)
            end

            def record_web_search_stats(search_event_ids)
              record_stats(search_calls: search_event_ids.size) if search_event_ids.any?
            end

            def reference_web_searches(event, search_event_ids)
              return if search_event_ids.empty?

              references_data = search_event_ids.map do |search_event_id|
                {
                  event_id: event.id,
                  reference_type: "Event",
                  reference_id: search_event_id,
                  created_at: event.created_at,
                  updated_at: event.created_at
                }
              end
              EventReference.insert_all(references_data)
            end

            def disable_credentials_on_auth_error(error)
          ''',
          )

          replace(
              "app/services/feed_refresh_workflow.rb",
              '''  def fail_refresh_event(error)
              return if @refresh_completed

              @refresh_event&.destroy!
              usage_rows = run_llm_usage_rows
              record_llm_usage_stats(usage_rows)

              event = Event.create!(
                type: "feed_refresh",
                level: :error,
                subject: feed,
                user: feed.user,
                message: error.message,
                metadata: {
                  status: "failed",
                  stats: stats,
                  error: {
                    class: error.class.name,
                    message: error.message,
                    stage: current_step.to_s,
                    backtrace: error.backtrace
                  }
                }
              )

              reference_llm_usages(event, usage_rows)
            end
          ''',
              '''  def fail_refresh_event(error)
              return if @refresh_completed

              usage_rows = run_llm_usage_rows
              search_event_ids = @refresh_event ? run_web_search_event_ids : []
              @refresh_event&.destroy!
              record_llm_usage_stats(usage_rows)
              record_web_search_stats(search_event_ids)

              event = Event.create!(
                type: "feed_refresh",
                level: :error,
                subject: feed,
                user: feed.user,
                message: error.message,
                metadata: {
                  status: "failed",
                  stats: stats,
                  error: {
                    class: error.class.name,
                    message: error.message,
                    stage: current_step.to_s,
                    backtrace: error.backtrace
                  }
                }
              )

              reference_llm_usages(event, usage_rows)
              reference_web_searches(event, search_event_ids)
            end
          ''',
          )

          replace(
              "app/jobs/search_credential_validation_job.rb",
              '''    credential.validating!
              credential.web_search_provider.search(VALIDATION_QUERY, max_results: 1)
          ''',
              '''    credential.validating!
              WebSearchUsage.record!(credential: credential)
              credential.web_search_provider.search(VALIDATION_QUERY, max_results: 1)
          ''',
          )

          replace(
              "app/models/event.rb",
              "  has_many :event_references, dependent: :delete_all\n",
              '''  has_many :event_references, dependent: :delete_all
            has_many :incoming_event_references, as: :reference,
                                                 class_name: "EventReference",
                                                 dependent: :delete_all
          ''',
          )

          replace(
              "app/models/search_credential.rb",
              "  has_many :feeds\n",
              '''  has_many :feeds
            has_many :events, as: :subject, dependent: :destroy
          ''',
          )
          replace(
              "app/models/search_credential.rb",
              '''  def web_search_provider
              WebSearchProvider.for(provider, api_key: credential_data["api_key"])
            end
          ''',
              '''  def web_search_provider
              WebSearchProvider.for(provider, api_key: credential_data["api_key"])
            end

            def provider_label
              WebSearchProvider.label_for(provider)
            end

            def estimated_search_cost_cents(call_count)
              BigDecimal(WebSearchProvider.cents_per_1k_requests_for(provider).to_s) * call_count / 1000
            end
          ''',
          )

          replace(
              "app/components/search_credential_details_component.rb",
              "        value: WebSearchProvider::REGISTRY.fetch(@search_credential.provider),\n",
              "        value: @search_credential.provider_label,\n",
          )
          replace(
              "app/components/search_credential_list_item_component.rb",
              "    WebSearchProvider::REGISTRY.fetch(credential.provider)\n",
              "    credential.provider_label\n",
          )
          replace(
              "app/components/feed_ai_settings_component.rb",
              '      ["#{credential.display_name} · #{WebSearchProvider::REGISTRY.fetch(credential.provider)}", credential.id]\n',
              '      ["#{credential.display_name} · #{credential.provider_label}", credential.id]\n',
          )
          replace(
              "app/views/search_credentials/new.html.erb",
              "                       WebSearchProvider::REGISTRY.map { |name, label| [label, name] },\n",
              "                       WebSearchProvider.options_for_select,\n",
          )
          replace(
              "app/views/search_credentials/edit.html.erb",
              "                             WebSearchProvider::REGISTRY.fetch(@search_credential.provider),\n",
              "                             @search_credential.provider_label,\n",
          )

          replace(
              "app/views/search_credentials/_show_content.html.erb",
              "    <%= render SearchCredentialDetailsComponent.new(search_credential: search_credential) %>\n",
              '''    <%= render SearchCredentialDetailsComponent.new(search_credential: search_credential) %>
              <%= render SearchCredentialUsageStatsComponent.new(search_credential: search_credential) %>
          ''',
          )

          replace(
              "app/controllers/events_controller.rb",
              "  include EventReferencedLlmUsages\n",
              "  include EventReferencedLlmUsages\n  include EventReferencedWebSearches\n",
          )
          replace(
              "app/controllers/events_controller.rb",
              "    @referenced_llm_usages = referenced_llm_usages(@event)\n",
              "    @referenced_llm_usages = referenced_llm_usages(@event)\n    @referenced_web_searches = referenced_web_searches(@event)\n",
          )
          replace(
              "app/controllers/admin/events_controller.rb",
              "  include EventReferencedLlmUsages\n",
              "  include EventReferencedLlmUsages\n  include EventReferencedWebSearches\n",
          )
          replace(
              "app/controllers/admin/events_controller.rb",
              "    @referenced_llm_usages = referenced_llm_usages(@event)\n",
              "    @referenced_llm_usages = referenced_llm_usages(@event)\n    @referenced_web_searches = referenced_web_searches(@event)\n",
          )

          search_section = '''
            <% if @referenced_web_searches.any? %>
              <section class="space-y-4" data-key="events.web_search_usage">
                <h2 class="text-2xl font-semibold mb-3 text-heading"><%= t("events.web_search_usage.section_title") %></h2>
                <%= render ListComponent.new do |list| %>
                  <% list.with_item(StatListItemComponent.new(
                    label: t("events.web_search_usage.calls"),
                    value: number_with_delimiter(@referenced_web_searches.count),
                    key: "events.web_search_usage.calls"
                  )) %>
                <% end %>
              </section>
            <% end %>
          '''
          for path in ["app/views/events/show.html.erb", "app/views/admin/events/show.html.erb"]:
              replace(
                  path,
                  '''  <% if (stats = @event.metadata&.fetch("stats", nil)).present? %>
          ''',
                  search_section + '''
            <% if (stats = @event.metadata&.fetch("stats", nil)).present? %>
          ''',
              )

          replace(
              "app/components/event_description_component.rb",
              '''    when AiCredential
              helpers.link_to(event.subject.display_name, helpers.ai_credential_path(event.subject), class: "font-medium text-brand underline underline-offset-4 transition hover:text-brand-hover")
            else
          ''',
              '''    when AiCredential
              helpers.link_to(event.subject.display_name, helpers.ai_credential_path(event.subject), class: "font-medium text-brand underline underline-offset-4 transition hover:text-brand-hover")
            when SearchCredential
              helpers.link_to(event.subject.display_name, helpers.search_credential_path(event.subject), class: "font-medium text-brand underline underline-offset-4 transition hover:text-brand-hover")
            else
          ''',
          )

          replace(
              "app/components/feed_llm_stats_component.rb",
              '''      {
                key: "estimated_spend",
                label: "Estimated spend (last #{period_in_days} days)",
                label_short: "Spend (#{period_in_days} days)",
                value: formatted_cost
              }
          ''',
              '''      {
                key: "estimated_spend",
                label: "Estimated AI spend (last #{period_in_days} days)",
                label_short: "AI spend (#{period_in_days} days)",
                value: formatted_cost
              },
              {
                key: "search_calls",
                label: "Search calls (last #{period_in_days} days)",
                label_short: "Search calls (#{period_in_days} days)",
                value: helpers.number_with_delimiter(search_call_count)
              },
              {
                key: "search_estimated_spend",
                label: "Estimated search spend (last #{period_in_days} days)",
                label_short: "Search spend (#{period_in_days} days)",
                value: formatted_search_cost
              }
          ''',
          )
          replace(
              "app/components/feed_llm_stats_component.rb",
              '''  def period_in_days
              LlmUsage::STATS_PERIOD.in_days.to_i
            end

            def formatted_cost
              helpers.number_to_currency(total_cost_cents / 100.0)
            end
          ''',
              '''  def web_search_events
              @web_search_events ||= WebSearchUsage.for_feed(@feed).to_a
            end

            def search_call_count
              web_search_events.size
            end

            def search_cost_cents
              @search_cost_cents ||= WebSearchUsage.estimated_cost_cents(web_search_events)
            end

            def period_in_days
              LlmUsage::STATS_PERIOD.in_days.to_i
            end

            def formatted_cost
              helpers.number_to_currency(total_cost_cents / 100.0)
            end

            def formatted_search_cost
              helpers.number_to_currency(search_cost_cents / 100, precision: 5)
            end
          ''',
          )

          replace(
              "config/locales/en.yml",
              '''    ai_credential_deactivated:
              name: "AI credential deactivated"
              description_html: "AI credential %{subject_link} stopped working; update the key to resume its feeds."
          ''',
              '''    ai_credential_deactivated:
              name: "AI credential deactivated"
              description_html: "AI credential %{subject_link} stopped working; update the key to resume its feeds."
            search_credential_deactivated:
              name: "Search credential deactivated"
              description_html: "Search credential %{subject_link} stopped working; update the key to resume its feeds."
            web_search:
              name: "Web search"
              description_html: "%{subject_link} made a web search request"
          ''',
          )
          replace(
              "config/locales/en.yml",
              '''        llm_cost_cents: "Estimated AI spend"
              llm_usage:
              section_title: "AI usage"
          ''',
              '''        llm_cost_cents: "Estimated AI spend"
              search_calls: "Search calls"
            llm_usage:
              section_title: "AI usage"
            web_search_usage:
              section_title: "Search usage"
              calls: "Search calls"
          ''',
          )

          replace(
              "CHANGELOG.md",
              "## 2026-07-14\n\n",
              "## 2026-07-14\n\n- Search credential and feed pages now show recent search-call counts and estimated search-provider spend.\n",
          )
          PY
      - name: Commit product wiring
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app config CHANGELOG.md
          git diff --cached --quiet && exit 0
          git commit -m "Add web search usage events and estimates"
          git push
