name: T5 capability probe patch

on:
  push:
    branches:
      - agent/006-t5-client-side-search

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/006-t5-client-side-search
      - name: Separate provider-native probes from production adapters
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("app/services/llm_capability_probe.rb")
          text = path.read_text()
          old_header = '''# Dev-time capability probe for LLM providers (spec 005 §5; issue #913).\n#\n# Live-verifies that a (provider, model) pair delivers what the AI engine\n# needs *through RubyLLM*, using the exact production call shapes from\n# LlmClient / Loader::LlmLoader: plain call, schema-only, web-search-only,\n# web-fetch-only, the two-step gather→structure pipeline, and (as evidence\n# for the two-step rationale) schema+web combined in one call.\n#\n# Deliberately independent of LlmProvider/AiCredential so an unwired\n# provider can be qualified before any app code exists for it. Keys come\n# from the environment, not the credentials table. Run via the dev-area\n# jobs runner (AnthropicCapabilityProbeJob / KimiCapabilityProbeJob) or\n# script/llm_capability_probe.rb. Results — evidence included — are\n# recorded as JobRun events and feed plan-03-provider-verification.md.\n'''
          new_header = '''# Dev-time capability probe for LLM providers (spec 005 §5; issue #913).\n#\n# Live-verifies provider-native behavior through RubyLLM: plain calls,\n# structured output, hosted search/fetch mechanisms, and one-call versus\n# two-step extraction. These checks are deliberately separate from the\n# production managed-search path, which uses LlmClient's client-side tools.\n#\n# The probe stays independent of LlmProvider and managed credentials so an\n# unwired provider can be qualified before application integration. Keys\n# come from the environment. Results — evidence included — are recorded as\n# JobRun events and feed plan-03-provider-verification.md.\n'''
          if old_header not in text:
              raise SystemExit("probe header did not match expected source")
          text = text.replace(old_header, new_header)

          old_method = '''      # Delegated so the probe qualifies exactly what production sends; the\n      # search-only/fetch-only variants below stay probe-local (production has\n      # no such split).\n      def web_params(model)\n        LlmClient::Adapter::Anthropic.new.web_params(model)\n      end\n'''
          new_method = '''      # Combined hosted-tool shape is probe-local. Production uses the managed\n      # client-side search and fetch tools instead.\n      def web_params(model)\n        { tools: web_search_params(model)[:tools] + web_fetch_params(model)[:tools] }\n      end\n'''
          if old_method not in text:
              raise SystemExit("Anthropic probe method did not match expected source")
          text = text.replace(old_method, new_method)
          text = text.replace(
              "    # Production pipeline: Loader::LlmLoader#load.\n",
              "    # Provider-native two-step capability comparison.\n",
          )
          text = text.replace(
              "    # Expected to fail through RubyLLM (spec 005 §6) — recorded as evidence;\n",
              "    # Provider-native combined capability check — recorded as evidence;\n",
          )
          path.write_text(text)
          PY
      - name: Commit probe clarification
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/services/llm_capability_probe.rb
          git diff --cached --quiet && exit 0
          git commit -m "Separate native capability probes from production search"
          git push
