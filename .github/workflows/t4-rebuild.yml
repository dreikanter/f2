name: T4 branch rebuild

on:
  push:
    branches:
      - agent/006-t4-search-feed-association-clean

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/006-t4-search-feed-association-clean
          fetch-depth: 0
      - name: Copy T4 files from the original branch
        run: |
          git fetch origin agent/006-t4-search-feed-association
          git checkout origin/agent/006-t4-search-feed-association -- \
            CHANGELOG.md \
            app/components/feed_ai_settings_component.html.erb \
            app/components/feed_ai_settings_component.rb \
            app/controllers/feed_previews_controller.rb \
            app/controllers/feeds_controller.rb \
            app/controllers/search_credentials/validations_controller.rb \
            app/controllers/search_credentials_controller.rb \
            app/javascript/controllers/ai_settings_controller.js \
            app/models/feed.rb \
            app/models/feed_preview.rb \
            app/models/search_credential.rb \
            app/views/feed_previews/_credential_gate.html.erb \
            app/views/search_credentials/_show_content.html.erb \
            app/views/search_credentials/new.html.erb \
            app/views/search_credentials/show.html.erb \
            db/migrate/20260714010000_add_search_credential_to_feeds.rb \
            db/schema.rb \
            test/controllers/feed_previews_controller_test.rb \
            test/controllers/feeds/search_credential_gate_test.rb \
            test/controllers/search_credentials/feed_detour_test.rb \
            test/factories/feeds.rb \
            test/integration/credential_gate_test.rb \
            test/integration/feed_ai_settings_test.rb \
            test/integration/feed_draft_flow_test.rb \
            test/integration/smart_feed_creation_ai_website_test.rb \
            test/models/feed/search_credential_test.rb \
            test/models/feed_preview/search_credential_digest_test.rb \
            test/models/search_credential/feed_lifecycle_test.rb
      - name: Commit rebuilt T4 delta
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            CHANGELOG.md \
            app/components/feed_ai_settings_component.html.erb \
            app/components/feed_ai_settings_component.rb \
            app/controllers/feed_previews_controller.rb \
            app/controllers/feeds_controller.rb \
            app/controllers/search_credentials/validations_controller.rb \
            app/controllers/search_credentials_controller.rb \
            app/javascript/controllers/ai_settings_controller.js \
            app/models/feed.rb \
            app/models/feed_preview.rb \
            app/models/search_credential.rb \
            app/views/feed_previews/_credential_gate.html.erb \
            app/views/search_credentials/_show_content.html.erb \
            app/views/search_credentials/new.html.erb \
            app/views/search_credentials/show.html.erb \
            db/migrate/20260714010000_add_search_credential_to_feeds.rb \
            db/schema.rb \
            test/controllers/feed_previews_controller_test.rb \
            test/controllers/feeds/search_credential_gate_test.rb \
            test/controllers/search_credentials/feed_detour_test.rb \
            test/factories/feeds.rb \
            test/integration/credential_gate_test.rb \
            test/integration/feed_ai_settings_test.rb \
            test/integration/feed_draft_flow_test.rb \
            test/integration/smart_feed_creation_ai_website_test.rb \
            test/models/feed/search_credential_test.rb \
            test/models/feed_preview/search_credential_digest_test.rb \
            test/models/search_credential/feed_lifecycle_test.rb
          git diff --cached --quiet && exit 0
          git commit -m "Rebase search credential feed integration onto main"
          git push origin HEAD:agent/006-t4-search-feed-association-clean
