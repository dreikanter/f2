name: T6 documentation patch

on:
  push:
    branches:
      - agent/006-t6-remove-env-search-seam

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/006-t6-remove-env-search-seam
      - name: Update search credential design record
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("specs/006-search-credentials/spec.md")
          text = path.read_text()
          replacements = {
              "**Status**: Draft — nothing shipped yet. Supersedes the interim ENV-based key resolution from #980.":
                  "**Status**: Active implementation — managed credentials and credential-only search are implemented; usage events and cost surfaces remain.",
              "- #980 landed `WebSearchProvider` (Serper / Brave / Tavily behind one normalized interface) with\n  key resolution explicitly scaffolded on ENV (`WebSearchProvider.default`, `ENV_KEYS`). That seam\n  was always meant to be replaced by a managed model mirroring `AiCredential`.\n":
                  "- #980 landed `WebSearchProvider` (Serper / Brave / Tavily behind one normalized interface).\n  Managed `SearchCredential` records now supply provider keys explicitly, mirroring `AiCredential`;\n  there is no process-environment fallback.\n",
              "- Delete the interim ENV seam once credential resolution is live: `WebSearchProvider.default`,\n  `.configured?`, `ENV_KEYS`, `env_key`, and the Moonshot adapter's `configured?` guard. No\n  migration or deprecation window — there is no production deployment yet.\n":
                  "- Credential resolution is exclusively `SearchCredential`-based. Providers receive an explicit\n  API key through `WebSearchProvider.for`; no process-environment fallback or adapter guard remains.\n",
              "5. **Delete the ENV seam** (§8) — last, after nothing reads it.\n":
                  "5. **Remove the temporary environment fallback** (§8) — complete after credential-backed adapters landed.\n",
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f"expected text not found: {old[:80]!r}")
              text = text.replace(old, new)
          path.write_text(text)
          PY
      - name: Commit documentation update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add specs/006-search-credentials/spec.md
          git diff --cached --quiet && exit 0
          git commit -m "Update search credential seam documentation"
          git push
