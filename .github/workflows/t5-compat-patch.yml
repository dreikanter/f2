name: T5 compatibility patch

on:
  push:
    branches:
      - agent/006-t5-client-side-search

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/006-t5-client-side-search
      - name: Keep context optional for non-web provider calls
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("app/services/llm_client.rb")
          text = path.read_text()
          old = "  def invoke_provider(ctx:, model:, prompt:, output_schema:, web:, system: nil)\n"
          new = "  def invoke_provider(ctx: nil, model:, prompt:, output_schema:, web:, system: nil)\n"
          if old not in text:
              raise SystemExit("invoke_provider signature did not match expected source")
          path.write_text(text.replace(old, new))
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/services/llm_client.rb
          git diff --cached --quiet && exit 0
          git commit -m "Keep non-web provider calls context-free"
          git push
